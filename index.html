<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        var path = window.location.pathname;
        if ((path.endsWith('/reset-password') || path.endsWith('/reset-password/')) && !window.location.hash) {
          var search = window.location.search;
          var cleanPath = path.replace(/\/reset-password\/?$/, '');
          window.location.replace(window.location.origin + cleanPath + '/#/reset-password' + search);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://base44.com/logo_v2.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="./manifest.json" />
    <title>Base44 APP</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
